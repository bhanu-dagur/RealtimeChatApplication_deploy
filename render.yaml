# ───────────────────────────────────────────────────────────────
# Render Blueprint — deploys all 7 backend services to free tier.
# Frontend (Angular) is deployed separately on Vercel.
#
# Each service has its own thin Dockerfile (Dockerfile.<service>)
# under ConnectHub/src/. We use per-service Dockerfiles instead of
# ARG-driven shared Dockerfile because Render's render.yaml does
# not pass docker build args at build time.
#
# After committing & pushing this file, in Render Dashboard:
#   New + → Blueprint → select repo → Render reads this file.
# Render will prompt for every env var marked `sync: false` —
# paste the real value for each (it never gets committed to git).
# ───────────────────────────────────────────────────────────────

services:
  # ── Auth.API ─────────────────────────────────────────────────
  - type: web
    name: connecthub-auth
    runtime: docker
    region: singapore
    plan: free
    rootDir: ConnectHub/src
    dockerfilePath: ./Services/ConnectHub.Auth.API/Dockerfile
    dockerContext: .
    autoDeploy: true
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: DOTNET_USE_POLLING_FILE_WATCHER
        value: "true"
      - key: ASPNETCORE_URLS
        value: http://+:10000
      - key: ConnectionStrings__DefaultConnection
        sync: false
      - key: Jwt__Key
        sync: false
      - key: Jwt__Issuer
        value: ConnectHub
      - key: Jwt__Audience
        value: ConnectHubUsers
      - key: Jwt__DurationInMinutes
        value: "60"
      - key: Google__ClientId
        sync: false

