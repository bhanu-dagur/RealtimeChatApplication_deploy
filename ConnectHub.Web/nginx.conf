server {
    listen 80;
    server_name _;

    # Angular puts the SPA under /browser when using the application builder (Angular 17+).
    # Files are copied directly to /usr/share/nginx/html in Dockerfile.
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — let Angular handle deep links like /dashboard/chat/...
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively, but never the entry HTML
    location ~* \.(js|css|woff2?|svg|png|jpg|gif|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /index.html {
        add_header Cache-Control "no-store";
    }
}
