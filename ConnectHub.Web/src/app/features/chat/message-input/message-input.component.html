<div class="input-area">
  <div class="input-row">

    <button class="tool-btn" title="Attach file" type="button">
      <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path
       d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48" />
      </svg>
    </button>

    <input class="msg-input" type="text" [placeholder]="placeholder" [(ngModel)]="message" (keydown)="onKeydown($event)"
      [disabled]="disabled" autocomplete="off" />

    <button class="tool-btn" title="Emoji" type="button">
      <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10" />
        <path d="M8 14s1.5 2 4 2 4-2 4-2" />
        <line x1="9" y1="9" x2="9.01" y2="9" />
        <line x1="15" y1="9" x2="15.01" y2="9" />
      </svg>
    </button>

    <button class="send-btn" type="button" (click)="send()" [class.active]="message.trim().length > 0"
      [disabled]="disabled">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
        <line x1="22" y1="2" x2="11" y2="13" />
        <polygon points="22 2 15 22 11 13 2 9 22 2" />
      </svg>
    </button>

  </div>
</div>
