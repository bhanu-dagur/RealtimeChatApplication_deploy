<div class="admin-layout">
  <!-- ── Icon Sidebar ── -->
  <aside class="icon-sidebar">
    <!-- Logo -->
    <div class="sidebar-logo">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
        <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z" fill="var(--danger)" opacity="0.9" />
      </svg>
    </div>

    <div class="sidebar-nav">
      <!-- Dashboard -->
      <button class="nav-icon-btn" routerLink="/admin/dashboard" routerLinkActive="active" title="Dashboard">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="9" rx="1"></rect>
          <rect x="14" y="3" width="7" height="5" rx="1"></rect>
          <rect x="14" y="12" width="7" height="9" rx="1"></rect>
          <rect x="3" y="16" width="7" height="5" rx="1"></rect>
        </svg>
        <span class="nav-label">Metrics</span>
      </button>

      <!-- Users -->
      <button class="nav-icon-btn" routerLink="/admin/users" routerLinkActive="active" title="Users">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2" />
          <circle cx="9" cy="7" r="4" />
          <path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75" />
        </svg>
        <span class="nav-label">Users</span>
      </button>

      <!-- Rooms -->
      <button class="nav-icon-btn" routerLink="/admin/rooms" routerLinkActive="active" title="Rooms">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
          <polyline points="9 22 9 12 15 12 15 22"></polyline>
        </svg>
        <span class="nav-label">Rooms</span>
      </button>

      <!-- Messages -->
      <button class="nav-icon-btn" routerLink="/admin/messages" routerLinkActive="active" title="Messages">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z" />
        </svg>
        <span class="nav-label">Messages</span>
      </button>
    </div>

    <div class="sidebar-bottom">
      <!-- Exit Admin -->
      <button class="nav-icon-btn" (click)="exitAdmin()" title="Exit Admin">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
          <polyline points="16 17 21 12 16 7"></polyline>
          <line x1="21" y1="12" x2="9" y2="12"></line>
        </svg>
        <span class="nav-label">App</span>
      </button>

      <button class="nav-icon-btn danger-btn" (click)="logout()" title="Logout">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18.36 6.64a9 9 0 1 1-12.73 0"></path>
          <line x1="12" y1="2" x2="12" y2="12"></line>
        </svg>
        <span class="nav-label">Logout</span>
      </button>
    </div>
  </aside>

  <!-- ── Main Content Area ── -->
  <main class="admin-main">
    <router-outlet></router-outlet>
  </main>
</div>
